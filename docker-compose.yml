services:

  discovery-service:
    build: ./discovery-service
    image: discovery-service:latest
    container_name: discovery-doc
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  config-server:
    build: ./config-server
    image: config-server:latest
    container_name: config-doc
    ports:
      - "9999:9999"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  user-service:
    build: ./user-service
    image: user-service:latest
    container_name: user-doc
    ports:
      - "8081:8081"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin-doc:9411/api/v2/spans
      - KAFKA_BOOTSTRAP_SERVERS=kafka-doc:9092
      - KEYCLOAK_URL=http://host.docker.internal:8085
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  account-service:
    build: ./account-service
    image: account-service:latest
    container_name: account-doc
    ports:
      - "8082:8082"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin-doc:9411/api/v2/spans
      - KEYCLOAK_URL=http://host.docker.internal:8085
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  transaction-service:
    build: ./transaction-service
    image: transaction-service:latest
    container_name: transaction-doc
    ports:
      - "8083:8083"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin-doc:9411/api/v2/spans
      - KAFKA_BOOTSTRAP_SERVERS=kafka-doc:9092
      - KEYCLOAK_URL=http://host.docker.internal:8085
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  fraud-service:
    build: ./fraud-service
    image: fraud-service:latest
    container_name: fraud-doc
    ports:
      - "8084:8084"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin-doc:9411/api/v2/spans
      - KEYCLOAK_URL=http://host.docker.internal:8085
      - KAFKA_BOOTSTRAP_SERVERS=kafka-doc:9092
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    container_name: gateway-doc
    ports:
      - "8888:8888"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      account-service:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 240s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-doc
    ports:
      - "9411:9411"

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka-doc
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-doc:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-doc:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop-doc
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka-doc:9092
    depends_on:
      - kafka


